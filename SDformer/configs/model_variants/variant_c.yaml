inherit_from: ../sdformer_baseline.yaml

dataset:
  name: dsec

model:
  name: variant_c
  attention:
    type: window_spike
    window_size: [2, 8, 8]
    pretrained_window_size: [0, 0, 0]
  spike_encoder:
    type: temporal_contrast
    temporal_contrast_eps: 1.0e-5
  temporal:
    adaptive_t: true
    early_exit_threshold: 0.02
  norm:
    type: RMSNorm
  neuron:
    type: plif
    v_th: 0.1
    v_reset: null
    tau: 2.0
  sparsity:
    enabled: true
    token_keep_ratio: 0.75
    export_masks: true
  quant:
    enabled: true
    weight_bits: 8
    activation_bits: 8
    membrane_bits: 12
    threshold_bits: 12

hw_export:
  target_variant: variant_c

