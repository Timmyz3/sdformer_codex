project:
  name: sdformerflow_hw
  seed: 42
  output_root: experiments
  baseline_commit: 13088516440ab3faba4142c986d162cf5dd7c299
  report_path: REPORT.md

runtime:
  mode: eval
  device: cuda
  mlflow_uri: ""
  num_workers: 4
  batch_size: 1
  epochs: 60

dataset:
  name: dsec
  root: data/Datasets/DSEC/saved_flow_data
  train_split: train
  eval_split: valid
  resolution: [480, 640]
  crop: [288, 384]
  polarity: true
  preprocessed: true
  scale_factor: 1

model:
  name: sdformer_baseline
  upstream_model_name: MS_SpikingformerFlowNet_en4
  encoding: voxel
  num_bins: 10
  mask_output: true
  norm_input: minmax
  attention:
    type: baseline
    window_size: [2, 9, 9]
    pretrained_window_size: [0, 0, 0]
  spike_encoder:
    type: voxel
    temporal_contrast_eps: 1.0e-6
  temporal:
    max_steps: 10
    adaptive_t: false
    early_exit_threshold: 0.0
  norm:
    type: BN
  neuron:
    type: psn
    v_th: 0.1
    v_reset: null
    tau: 2.0
    detach_reset: true
    surrogate_fun: surrogate.ATan()
  sparsity:
    enabled: false
    token_keep_ratio: 1.0
    export_masks: false
  quant:
    enabled: false
    weight_bits: 8
    activation_bits: 8
    membrane_bits: 12
    threshold_bits: 12

optimizer:
  lr: 1.0e-4
  weight_decay: 1.0e-2
  scheduler: multistep
  milestones: [10, 20, 30, 40, 50, 70, 90, 120]
  use_amp: true

loss:
  lambda_mod: 1.0
  lambda_ang: 0.0
  gamma: null
  clip_grad: 100.0

metrics:
  names: [AEE, AAE]
  flow_scaling: 1
  mask_events: false

upstream:
  repo_root: third_party/SDformerFlow
  train_entry: train_flow_parallel_supervised_SNN.py
  eval_entry: eval_DSEC_flow_SNN.py
  base_train_config: third_party/SDformerFlow/configs/train_DSEC_supervised_SDformerFlow_en4.yml
  base_eval_config: third_party/SDformerFlow/configs/valid_DSEC_supervised.yml

hw_export:
  quant_spec: configs/hw/quant_spec.yaml
  output_dir: experiments/results/hw_export
  target_variant: variant_c
