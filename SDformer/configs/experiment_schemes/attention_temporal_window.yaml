inherit_from: ../sdformer_baseline.yaml

model:
  name: attention_temporal_window
  plug_in_modules:
    - kind: token_mixer
      name: temporal_shift
      shift_div: 2
    - kind: sparse_ops
      name: timestep_budget
      threshold: 0.02
    - kind: sparse_ops
      name: window_topk
      keep_ratio: 0.75
      window_size: [8, 8]
