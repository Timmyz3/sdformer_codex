experiment: DSEC_subset_ablation

data:
    sequence_list_overrides:
        valid: valid_subset_split_seq.csv

loader:
    batch_size: 1
    resolution: [480, 640]
    scale_factor: 1
    crop: [288, 384]
    gpu: 0

model:
    norm_input: "minmax"

loss:
    lambda_mod: 1
    lambda_ang: 0

metrics:
    name: [AEE, AAE]
    mask_events: False

vis:
    verbose: False
    enabled: False
    px: 400
    store: False
    monitor_fr: False
    monitor_v: False

test:
    scale_factor: 1
    sample: 10
