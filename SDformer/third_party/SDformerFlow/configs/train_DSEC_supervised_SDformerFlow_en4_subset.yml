experiment: DSEC_subset_ablation

data:
    path: ../../data/Datasets/DSEC/saved_flow_data
    preprocessed: True
    num_frames: 10
    num_chunks: 1
    step_mode: 'm'
    spike_th: Null
    sequence_list_overrides:
        train: train_subset_split_seq.csv
        valid: valid_subset_split_seq.csv

model:
    name: MS_SpikingformerFlowNet_en4
    encoding: voxel
    norm_input: "minmax"
    num_bins: 10
    base_num_channels: 96
    kernel_size: 3
    activations: [relu, Null]
    final_activation: Null
    mask_output: True
    norm: Null
    use_upsample_conv: False

swin_transformer:
    use_arc: ["swinv1", "MS_PED_Spiking_PatchEmbed_Conv_sfn"]
    state_combination: "none"
    base_num_channels: 96
    swin_depths: [2, 2, 6, 2]
    swin_num_heads: [3, 6, 12, 24]
    swin_out_indices: [0, 1, 2, 3]
    swin_patch_size: [1, 1, 2, 2]
    window_size: [2, 9, 9]
    pretrained_window_size: [0, 0, 0]
    mlp_ratio: 4

spiking_neuron:
    num_steps: 10
    v_th: 0.1
    v_reset: Null
    neuron_type: psn
    surrogate_fun: surrogate.ATan()
    tau: 2.
    detach_reset: True
    spike_norm: "BN"

loss:
    training: 'supervised'
    lambda_mod: 1
    lambda_ang: 0
    flow_regul_weight: 0.001
    gamma: Null
    clip_grad: 100.0
    overwrite_intermediate: False

optimizer:
    name: AdamW
    lr: 0.0001
    wd: 0.01
    scheduler: "multistep"
    milestones: [2, 4]
    use_amp: True
    num_acc: 1

loader:
    n_epochs: 5
    batch_size: 1
    batch_multiplyer: 1
    resolution: [480, 640]
    augment: ["Horizontal", "Vertical", "Polarity"]
    augment_prob: [0.5, 0.5, 0.0]
    max_drop_rate: 0.6
    polarity: True
    crop: [288, 384]
    gpu: 0
    n_workers: 0
    parallel: False
    seed: 0

vis:
    verbose: False
    enabled: False
    px: 400
    store_grads: False
    store: False
    mask_events: False
    store_spike_rates: False

metrics:
    name: [AEE]
    flow_scaling: 1
    mask_events: False

test:
    sample: 10
    n_valid: 1
