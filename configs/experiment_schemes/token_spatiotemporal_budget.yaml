inherit_from: ../sdformer_baseline.yaml

model:
  name: token_spatiotemporal_budget
  plug_in_modules:
    - kind: sparse_ops
      name: timestep_budget
      threshold: 0.02
    - kind: sparse_ops
      name: window_topk
      keep_ratio: 0.75
      window_size: [8, 8]
    - kind: sparse_ops
      name: structured_token
      keep_ratio: 0.75
