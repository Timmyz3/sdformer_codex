inherit_from: ../sdformer_baseline.yaml

model:
  name: variant_modular
  plug_in_modules:
    - kind: external_inspirations
      name: temporal_attention_reuse
      reuse_threshold: 0.02
      momentum: 0.8
    - kind: external_inspirations
      name: activity_window_scheduler
      window_size: [8, 8]
      keep_ratio: 0.75
      hysteresis: 0.5
    - kind: external_inspirations
      name: graph_token_pruner
      keep_ratio: 0.65
      self_weight: 0.6
      neighborhood_weight: 0.4
